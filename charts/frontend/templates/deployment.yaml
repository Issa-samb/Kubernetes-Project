apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "frontend.fullname" . }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "frontend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "frontend.selectorLabels" . | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: frontend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: DISABLE_PROFILER
              value: {{ .Values.env.DISABLE_PROFILER | quote }}
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: {{ .Values.env.PRODUCT_CATALOG_SERVICE_ADDR }}
            - name: CURRENCY_SERVICE_ADDR
              value: {{ .Values.env.CURRENCY_SERVICE_ADDR }}
            - name: CART_SERVICE_ADDR
              value: {{ .Values.env.CART_SERVICE_ADDR }}
            - name: RECOMMENDATION_SERVICE_ADDR
              value: {{ .Values.env.RECOMMENDATION_SERVICE_ADDR }}
            - name: SHIPPING_SERVICE_ADDR
              value: {{ .Values.env.SHIPPING_SERVICE_ADDR }}
            - name: CHECKOUT_SERVICE_ADDR
              value: {{ .Values.env.CHECKOUT_SERVICE_ADDR }}
            - name: AD_SERVICE_ADDR
              value: {{ .Values.env.AD_SERVICE_ADDR }}
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: {{ .Values.env.SHOPPING_ASSISTANT_SERVICE_ADDR }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
