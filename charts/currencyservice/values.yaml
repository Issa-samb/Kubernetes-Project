replicaCount: 1

image:
  repository: registry.gitlab.unige.ch/the_final_project/docker-project/currencyservice
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: gitlab-registry

service:
  type: ClusterIP
  port: 7000

env:
  PORT: "7000"
  DISABLE_PROFILER: "1"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
