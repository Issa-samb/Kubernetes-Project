replicaCount: 1

image:
  repository: registry.gitlab.unige.ch/the_final_project/docker-project/adservice
  tag: "latest"
  pullPolicy: Always

imagePullSecrets:
  - name: gitlab-registry

service:
  type: ClusterIP
  port: 9555

env:
  PORT: "9555"
  DISABLE_PROFILER: "1"

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"
